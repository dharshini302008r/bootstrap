

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* Background Image */
            background: url('ai.jpeg') no-repeat center center/cover;
            height: 100vh;
        }

        /* Overlay (dark blur effect) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(47, 19, 171, 0.5);
            z-index: -1;
        }

        /* Header */
        .header {
            background: rgba(106, 17, 203, 0.7);
            color: white;
            text-align: center;
            padding: 60px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 15px;
        }

        /* Glass card */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            padding: 40px 20px;
            color: white;
            text-align: center;
        }

        .badge-skill {
            background: #ffffff;
            color: #333;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 5px;
            display: inline-block;
            font-weight: bold;
            transition: 0.3s;
        }

        .badge-skill:hover {
            transform: scale(1.1);
        }

        /* Buttons */
        .btn-project {
            border-radius: 20px;
            margin: 5px;
            background: #ff9f43;
            color: white;
            border: none;
            transition: 0.3s;
        }

        .btn-project:hover {
            transform: scale(1.1);
            background: #ff7f00;
        }

        footer {
            background: rgba(106, 17, 203, 0.8);
            color: white;
            padding: 10px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="container-fluid header">
    
    <p>B.Sc Artificial Intelligence & Machine Learning</p>
    <p>Interested in Artificial Intelligence, Machine Learning and Web Development.</p>
</div>

<!-- Skills & Projects -->
<div class="container mt-4">
    <div class="glass">
        <h3>Technical Skills</h3>

        <div class="mt-3">
            <span class="badge-skill">Python</span>
            <span class="badge-skill">HTML</span>
            <span class="badge-skill">CSS</span>
            <span class="badge-skill">Bootstrap</span>
            <span class="badge-skill">Machine Learning</span>
        </div>

        <!-- Projects -->
        <div class="mt-4">
            <h3>Projects</h3>

            <a href="#" class="btn btn-project">Login Form</a>
            <a href="#" class="btn btn-project">Student Info</a>
            <a href="#" class="btn btn-project">Portfolio</a>
            <a href="#" class="btn btn-project">Food Corner</a>
            <a href="#" class="btn btn-project">Gallery</a>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
   dharshini302008© 2026 Portfolio
</footer>

</body>
</html>
